<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"/>
  <meta name="theme-color" content="#070b14"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Super Jeu"/>
  <title>Le Super Jeu</title>
  <link rel="manifest" href="manifest.json"/>
  <link rel="icon" href="icon-192.png"/>
  <link rel="apple-touch-icon" href="icon-192.png"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    html,body,#root{height:100%;background:#070b14}
    body{overscroll-behavior:none;-webkit-tap-highlight-color:transparent}
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <script type="text/babel">
    const { useState, useEffect } = React;



const PALETTE = [
  ["#f97316","#fb923c"],["#a78bfa","#7c3aed"],["#34d399","#059669"],
  ["#60a5fa","#2563eb"],["#f472b6","#db2777"],["#facc15","#ca8a04"],
  ["#e879f9","#a21caf"],["#38bdf8","#0284c7"],["#fb7185","#e11d48"],
  ["#4ade80","#15803d"],
];
const pc = (id) => PALETTE[Math.abs(id) % PALETTE.length];
const fmt = (n) => {
  const v = parseFloat(n) || 0;
  if (v >= 1000) return (v/1000).toFixed(2).replace(/\.?0+$/, "") + "K";
  // keep up to 2 decimals, strip trailing zeros
  return parseFloat(v.toFixed(2)).toString();
};
const uid = () => Math.floor(Date.now() * Math.random() * 1000);
const totalScore = (rounds) => rounds.reduce((s,r) => s + (parseFloat(r.s1) || 0) + (parseFloat(r.s2) || 0), 0);

const INIT_PLAYERS = [];
const INIT_SEASONS = [];

function Avatar({ name, id, size=40 }) {
  const [c1,c2]=pc(id);
  return (
    <div style={{width:size,height:size,borderRadius:"50%",
      background:`linear-gradient(135deg,${c1},${c2})`,
      display:"flex",alignItems:"center",justifyContent:"center",
      fontWeight:900,fontSize:size*0.42,color:"#fff",
      boxShadow:`0 2px 10px ${c1}55`,flexShrink:0}}>
      {name[0].toUpperCase()}
    </div>
  );
}

function RankBadge({ rank }) {
  if (rank===1) return <span style={{fontSize:20,filter:"drop-shadow(0 0 8px #ffd700aa)"}}>🥇</span>;
  if (rank===2) return <span style={{fontSize:20,filter:"drop-shadow(0 0 8px #c0c0c0aa)"}}>🥈</span>;
  if (rank===3) return <span style={{fontSize:20,filter:"drop-shadow(0 0 8px #cd7f32aa)"}}>🥉</span>;
  return <span style={{color:"#64748b",fontFamily:"monospace",fontWeight:700,fontSize:13}}>#{rank}</span>;
}

function Trend({ current, prev }) {
  if (prev==null) return <span style={{color:"#475569",fontSize:11}}>—</span>;
  const diff = prev - current;
  if (diff > 0)  return <span style={{color:"#34d399",fontSize:11,fontWeight:900}}>▲{diff}</span>;
  if (diff < 0)  return <span style={{color:"#f87171",fontSize:11,fontWeight:900}}>▼{Math.abs(diff)}</span>;
  return <span style={{color:"#475569",fontSize:11}}>—</span>;
}

function Input({ value, onChange, placeholder, type="text", style={} }) {
  return (
    <input value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder} type={type}
      style={{background:"#111827",border:"1px solid #1f2937",borderRadius:10,
        color:"#f1f5f9",padding:"10px 14px",fontSize:14,outline:"none",
        width:"100%",boxSizing:"border-box",...style}}/>
  );
}

function Btn({ children, onClick, variant="primary", style={} }) {
  const V = {
    primary:{ background:"linear-gradient(90deg,#7c3aed,#2563eb)",color:"#fff",border:"none" },
    ghost:  { background:"#1e293b",color:"#94a3b8",border:"1px solid #334155" },
    success:{ background:"#14532d22",color:"#4ade80",border:"1px solid #14532d55" },
    season: { background:"linear-gradient(90deg,#0ea5e9,#6366f1)",color:"#fff",border:"none" },
  };
  return (
    <button onClick={onClick} style={{borderRadius:10,padding:"10px 16px",fontWeight:700,
      fontSize:13,cursor:"pointer",letterSpacing:0.5,...V[variant],...style}}>
      {children}
    </button>
  );
}

function Modal({ title, onClose, children }) {
  return (
    <div style={{position:"fixed",inset:0,zIndex:100,background:"#000000cc",
      display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
      <div style={{background:"#0d1117",border:"1px solid #1f2937",borderRadius:20,
        padding:24,width:"100%",maxWidth:440,maxHeight:"85vh",overflowY:"auto",
        boxShadow:"0 24px 60px #000a",animation:"popIn 0.2s ease"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
          <h2 style={{margin:0,fontSize:15,color:"#e2e8f0",letterSpacing:2,
            textTransform:"uppercase",fontFamily:"'Orbitron',monospace"}}>{title}</h2>
          <button onClick={onClose} style={{background:"none",border:"none",
            color:"#64748b",fontSize:20,cursor:"pointer",lineHeight:1}}>✕</button>
        </div>
        {children}
      </div>
    </div>
  );
}

function App() {
  const _saved = loadSaved();
  const [players,      setPlayers]      = useState(_saved?.players      || INIT_PLAYERS);
  const [seasons,      setSeasons]      = useState(_saved?.seasons      || INIT_SEASONS);
  const [activeSeason, setActiveSeason] = useState(_saved?.activeSeason || null);
  const [view,         setView]         = useState("leaderboard");
  const [modal,        setModal]        = useState(null);
  const [search,       setSearch]       = useState("");

  const [mSeason,  setMSeason]  = useState({ name:"", totalGames:"" });
  const [mPlayer,  setMPlayer]  = useState({ name:"" });
  const [mSeasonId,setMSeasonId]= useState(null);
  const [mEntry,   setMEntry]   = useState({ playerId:null, s1:"", s2:"" });
  const [mRounds,  setMRounds]  = useState(null);

  useEffect(() => { saveAll(players, seasons, activeSeason); }, [players, seasons, activeSeason]);

  const currentSeason = seasons.find(s=>s.id===activeSeason) || seasons[0] || null;

  const leaderboard = currentSeason
    ? [...currentSeason.entries]
        .map(e=>({...e, total:totalScore(e.rounds), games:e.rounds.length}))
        .sort((a,b)=>b.total-a.total)
        .map((e,i)=>({...e, rank:i+1, player:players.find(p=>p.id===e.playerId)}))
        .filter(e=>e.player && e.player.name.toLowerCase().includes(search.toLowerCase()))
    : [];

  function createSeason() {
    if (!mSeason.name.trim()) return;
    const ns = { id:uid(), name:mSeason.name.trim(), totalGames:parseInt(mSeason.totalGames)||10, entries:[] };
    setSeasons(prev=>[...prev,ns]);
    setActiveSeason(ns.id);
    setModal(null); setMSeason({name:"",totalGames:""});
  }

  function deleteSeason(id) {
    setSeasons(prev=>{ const n=prev.filter(s=>s.id!==id); if(activeSeason===id) setActiveSeason(n[0]?.id||null); return n; });
  }

  function createPlayer() {
    if (!mPlayer.name.trim()) return;
    setPlayers(prev=>[...prev,{id:uid(),name:mPlayer.name.trim()}]);
    setModal(null); setMPlayer({name:""});
  }

  function deletePlayer(id) {
    setPlayers(prev=>prev.filter(p=>p.id!==id));
    setSeasons(prev=>prev.map(s=>({...s,entries:s.entries.filter(e=>e.playerId!==id)})));
  }

  function addPlayerToSeason(seasonId, playerId) {
    setSeasons(prev=>prev.map(s=>{
      if (s.id!==seasonId||s.entries.find(e=>e.playerId===playerId)) return s;
      return {...s, entries:[...s.entries,{playerId,rounds:[],prevRank:null}]};
    }));
  }

  function removePlayerFromSeason(seasonId, playerId) {
    setSeasons(prev=>prev.map(s=>
      s.id!==seasonId?s:{...s,entries:s.entries.filter(e=>e.playerId!==playerId)}
    ));
  }

  function openAddRound(entry) {
    setMEntry({playerId:entry.playerId, s1:"", s2:""});
    setModal("addRound");
  }

  function saveRound() {
    const s1=parseFloat(mEntry.s1)||0, s2=parseFloat(mEntry.s2)||0;
    if (!currentSeason) return;
    // snapshot ranks before update → used for trend on NEXT save
    const prevRanks={};
    [...currentSeason.entries]
      .map(e=>({...e,total:totalScore(e.rounds)}))
      .sort((a,b)=>b.total-a.total)
      .forEach((e,i)=>{ prevRanks[e.playerId]=i+1; });

    setSeasons(prev=>prev.map(s=>{
      if (s.id!==currentSeason.id) return s;
      return {...s, entries:s.entries.map(e=>
        e.playerId!==mEntry.playerId ? e :
        {...e, rounds:[...e.rounds,{s1,s2}], prevRank:prevRanks[e.playerId]??null}
      )};
    }));
    setModal(null);
  }

  function deleteRound(playerId, idx) {
    setSeasons(prev=>prev.map(s=>
      s.id!==currentSeason?.id?s:{...s,entries:s.entries.map(e=>
        e.playerId!==playerId?e:{...e,rounds:e.rounds.filter((_,i)=>i!==idx)}
      )}
    ));
  }

  const tabs=[
    {id:"leaderboard",label:"Classement",icon:"🏆"},
    {id:"seasons",    label:"Saisons",   icon:"📅"},
    {id:"players",    label:"Joueurs",   icon:"👥"},
  ];

  return (
    <div style={{minHeight:"100vh",background:"#070b14",color:"#f1f5f9",
      fontFamily:"'Segoe UI',sans-serif",paddingBottom:80}}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&display=swap');
        *{box-sizing:border-box}
        input::placeholder{color:#374151}
        button:active{opacity:0.75}
        @keyframes popIn{from{opacity:0;transform:scale(0.93)}to{opacity:1;transform:scale(1)}}
        @keyframes slideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
        .row{animation:slideUp 0.25s ease both}
      `}</style>

      {/* Header */}
      <div style={{background:"linear-gradient(180deg,#0d1223,transparent)",
        padding:"28px 20px 16px",textAlign:"center",borderBottom:"1px solid #0f172a",
        position:"relative",overflow:"hidden"}}>
        <div style={{position:"absolute",inset:0,
          background:"radial-gradient(ellipse at 50% -20%,#3b82f618,transparent 65%)",pointerEvents:"none"}}/>
        <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:10}}>
          <span style={{fontSize:26}}>🏆</span>
          <h1 style={{margin:0,fontSize:22,fontWeight:900,letterSpacing:5,
            fontFamily:"'Orbitron',monospace",
            background:"linear-gradient(90deg,#60a5fa,#a78bfa,#34d399)",
            WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>LE SUPER JEU</h1>
        </div>
        {seasons.length>0&&(
          <div style={{marginTop:12,display:"flex",gap:6,overflowX:"auto",
            justifyContent:"center",flexWrap:"wrap"}}>
            {seasons.map(s=>(
              <button key={s.id} onClick={()=>setActiveSeason(s.id)} style={{
                background:s.id===activeSeason?"linear-gradient(90deg,#2563eb,#7c3aed)":"#0f1729",
                border:s.id===activeSeason?"none":"1px solid #1e293b",
                borderRadius:20,color:s.id===activeSeason?"#fff":"#64748b",
                padding:"5px 14px",fontSize:12,cursor:"pointer",fontWeight:700,
                letterSpacing:0.5,whiteSpace:"nowrap",transition:"all 0.2s"
              }}>{s.name}</button>
            ))}
          </div>
        )}
      </div>

      <div style={{maxWidth:480,margin:"0 auto",padding:"0 14px"}}>

        {/* ══ LEADERBOARD ══ */}
        {view==="leaderboard"&&(
          <div style={{paddingTop:16}}>
            {!currentSeason?(
              <div style={{textAlign:"center",padding:"60px 0",color:"#374151"}}>
                <div style={{fontSize:48,marginBottom:12}}>📅</div>
                <p>Aucune saison créée.</p>
                <Btn onClick={()=>setView("seasons")} variant="season" style={{marginTop:8}}>Créer une saison</Btn>
              </div>
            ):(
              <>
                <div style={{background:"#0d1117",border:"1px solid #1e293b",borderRadius:14,
                  padding:"12px 16px",marginBottom:14,display:"flex",
                  justifyContent:"space-between",alignItems:"center"}}>
                  <div>
                    <div style={{fontSize:13,fontWeight:700,color:"#e2e8f0"}}>{currentSeason.name}</div>
                    <div style={{fontSize:11,color:"#475569",marginTop:2}}>
                      {currentSeason.entries.length} joueur{currentSeason.entries.length!==1?"s":""} · {currentSeason.totalGames} parties max
                    </div>
                  </div>
                  <button onClick={()=>{setMSeasonId(currentSeason.id);setModal("seasonPlayers");}} style={{
                    background:"#1e293b",border:"1px solid #334155",borderRadius:8,
                    color:"#60a5fa",padding:"6px 12px",fontSize:12,cursor:"pointer",fontWeight:700
                  }}>+ Joueurs</button>
                </div>

                <Input value={search} onChange={setSearch} placeholder="🔍  Rechercher..." style={{marginBottom:14}}/>

                {/* Podium */}
                {leaderboard.length>=2&&!search&&(
                  <div style={{display:"flex",gap:8,marginBottom:18,alignItems:"flex-end"}}>
                    {[1,0,2].map(idx=>{
                      const e=leaderboard[idx]; if(!e) return null;
                      const first=idx===0; const [c1]=pc(e.player.id);
                      return (
                        <div key={e.playerId} style={{
                          flex:first?1.2:1,background:`${c1}12`,
                          border:`1px solid ${c1}33`,borderRadius:14,
                          padding:first?"18px 10px":"12px 8px",textAlign:"center",
                          boxShadow:first?`0 0 20px ${c1}22`:"",position:"relative"}}>
                          {first&&<div style={{position:"absolute",top:-10,left:"50%",
                            transform:"translateX(-50%)",fontSize:18}}>👑</div>}
                          <Avatar name={e.player.name} id={e.player.id} size={first?48:38}/>
                          <div style={{fontSize:11,fontWeight:700,color:"#e2e8f0",marginTop:6,letterSpacing:0.3}}>
                            {e.player.name.length>9?e.player.name.slice(0,8)+"…":e.player.name}
                          </div>
                          <div style={{fontSize:first?15:12,fontWeight:900,color:c1,
                            fontFamily:"monospace",marginTop:2}}>{fmt(e.total)}</div>
                          <div style={{fontSize:10,color:"#475569",marginTop:2}}>
                            {e.games}/{currentSeason.totalGames} parties
                          </div>
                          <div style={{marginTop:5,display:"flex",justifyContent:"center",
                            alignItems:"center",gap:6}}>
                            <RankBadge rank={e.rank}/>
                            <Trend current={e.rank} prev={e.prevRank}/>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                )}

                {/* List */}
                <div style={{display:"flex",flexDirection:"column",gap:7}}>
                  {leaderboard.map((e,i)=>{
                    const [c1,c2]=pc(e.player.id);
                    const pct=currentSeason.totalGames>0?Math.round(e.games/currentSeason.totalGames*100):0;
                    const last=e.rounds[e.rounds.length-1];
                    return (
                      <div key={e.playerId} className="row"
                        style={{animationDelay:`${i*0.04}s`,
                          background:e.rank<=3&&!search?`linear-gradient(90deg,${c1}10,transparent)`:"#0d1117",
                          border:`1px solid ${e.rank<=3&&!search?c1+"2a":"#1e293b"}`,
                          borderRadius:14,padding:"11px 12px",
                          display:"flex",alignItems:"center",gap:10}}>

                        <div style={{minWidth:28,textAlign:"center"}}><RankBadge rank={e.rank}/></div>
                        <Avatar name={e.player.name} id={e.player.id} size={38}/>

                        <div style={{flex:1,minWidth:0}}>
                          <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
                            <span style={{fontWeight:700,fontSize:13,color:"#f1f5f9",
                              whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>
                              {e.player.name}
                            </span>
                            <Trend current={e.rank} prev={e.prevRank}/>
                          </div>
                          <div style={{marginTop:5,height:4,background:"#1e293b",borderRadius:4,overflow:"hidden"}}>
                            <div style={{height:"100%",width:`${pct}%`,
                              background:`linear-gradient(90deg,${c1},${c2})`,borderRadius:4}}/>
                          </div>
                          <div style={{fontSize:10,color:"#475569",marginTop:2,display:"flex",gap:8,flexWrap:"wrap"}}>
                            <span>{e.games}/{currentSeason.totalGames} parties</span>
                            {last&&(
                              <span>
                                dernière: <span style={{color:c1,fontWeight:700}}>{last.s1}</span>
                                <span style={{color:"#334155"}}> + </span>
                                <span style={{color:c1,fontWeight:700}}>{last.s2}</span>
                                <span style={{color:"#475569"}}> = {fmt((parseFloat(last.s1)||0)+(parseFloat(last.s2)||0))}</span>
                              </span>
                            )}
                          </div>
                        </div>

                        <div style={{textAlign:"right",minWidth:52}}>
                          <div style={{fontFamily:"monospace",fontWeight:900,fontSize:16,color:c1}}>
                            {fmt(e.total)}
                          </div>
                          <div style={{fontSize:10,color:"#475569",marginTop:1}}>pts</div>
                        </div>

                        <div style={{display:"flex",flexDirection:"column",gap:4}}>
                          <button onClick={()=>openAddRound(e)} title="Ajouter une partie" style={{
                            background:"#1e293b",border:"1px solid #334155",borderRadius:8,
                            color:"#60a5fa",width:30,height:30,cursor:"pointer",fontSize:16,
                            display:"flex",alignItems:"center",justifyContent:"center"}}>＋</button>
                          <button onClick={()=>{
                            setMRounds({playerId:e.playerId,playerName:e.player.name});
                            setModal("viewRounds");
                          }} title="Voir les parties" style={{
                            background:"#1e293b",border:"1px solid #334155",borderRadius:8,
                            color:"#a78bfa",width:30,height:30,cursor:"pointer",fontSize:13,
                            display:"flex",alignItems:"center",justifyContent:"center"}}>📋</button>
                        </div>
                      </div>
                    );
                  })}
                  {leaderboard.length===0&&(
                    <div style={{textAlign:"center",padding:"40px 0",color:"#374151"}}>
                      <div style={{fontSize:36}}>👥</div>
                      <p style={{fontSize:13,marginTop:8}}>Aucun joueur dans cette saison.</p>
                      <Btn onClick={()=>{setMSeasonId(currentSeason.id);setModal("seasonPlayers");}}
                        variant="ghost" style={{marginTop:8}}>Ajouter des joueurs</Btn>
                    </div>
                  )}
                </div>
              </>
            )}
          </div>
        )}

        {/* ══ SEASONS ══ */}
        {view==="seasons"&&(
          <div style={{paddingTop:16}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
              <h2 style={{margin:0,fontSize:13,color:"#94a3b8",letterSpacing:2,
                textTransform:"uppercase",fontFamily:"'Orbitron',monospace"}}>Saisons</h2>
              <Btn onClick={()=>setModal("newSeason")} variant="season" style={{padding:"8px 14px"}}>
                + Nouvelle saison
              </Btn>
            </div>
            {seasons.length===0&&(
              <div style={{textAlign:"center",padding:"60px 0",color:"#374151"}}>
                <div style={{fontSize:48}}>📅</div><p>Aucune saison.</p>
              </div>
            )}
            <div style={{display:"flex",flexDirection:"column",gap:10}}>
              {seasons.map(s=>{
                const top=[...s.entries].map(e=>({...e,total:totalScore(e.rounds)}))
                  .sort((a,b)=>b.total-a.total)[0];
                const topPlayer=top?players.find(p=>p.id===top.playerId):null;
                return (
                  <div key={s.id} style={{background:"#0d1117",
                    border:`1px solid ${activeSeason===s.id?"#3b82f655":"#1e293b"}`,
                    borderRadius:16,padding:"14px 16px",
                    boxShadow:activeSeason===s.id?"0 0 16px #3b82f620":""}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                      <div>
                        <div style={{fontWeight:800,fontSize:15,color:"#e2e8f0",letterSpacing:0.5}}>
                          {s.name}
                          {activeSeason===s.id&&(
                            <span style={{marginLeft:8,fontSize:10,color:"#22c55e",
                              background:"#14532d33",padding:"2px 7px",borderRadius:10,
                              verticalAlign:"middle"}}>ACTIVE</span>
                          )}
                        </div>
                        <div style={{fontSize:12,color:"#475569",marginTop:4}}>
                          {s.entries.length} joueur{s.entries.length!==1?"s":""} · {s.totalGames} parties max
                        </div>
                        {topPlayer&&(
                          <div style={{fontSize:12,color:"#64748b",marginTop:4}}>
                            🏅 Leader: <span style={{color:"#a78bfa",fontWeight:700}}>{topPlayer.name}</span> — {fmt(top.total)} pts
                          </div>
                        )}
                      </div>
                      <div style={{display:"flex",gap:6}}>
                        <button onClick={()=>setActiveSeason(s.id)} style={{
                          background:activeSeason===s.id?"#1e40af33":"#1e293b",
                          border:`1px solid ${activeSeason===s.id?"#3b82f655":"#334155"}`,
                          borderRadius:8,color:"#60a5fa",padding:"6px 10px",
                          fontSize:12,cursor:"pointer",fontWeight:700
                        }}>{activeSeason===s.id?"✓ Active":"Voir"}</button>
                        <button onClick={()=>deleteSeason(s.id)} style={{
                          background:"#7f1d1d22",border:"1px solid #7f1d1d44",
                          borderRadius:8,color:"#f87171",padding:"6px 10px",fontSize:12,cursor:"pointer"
                        }}>🗑</button>
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        )}

        {/* ══ PLAYERS ══ */}
        {view==="players"&&(
          <div style={{paddingTop:16}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
              <h2 style={{margin:0,fontSize:13,color:"#94a3b8",letterSpacing:2,
                textTransform:"uppercase",fontFamily:"'Orbitron',monospace"}}>Joueurs</h2>
              <Btn onClick={()=>setModal("newPlayer")} variant="primary" style={{padding:"8px 14px"}}>
                + Joueur
              </Btn>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              {players.map(p=>{
                const totalPts=seasons.reduce((acc,s)=>{
                  const e=s.entries.find(e=>e.playerId===p.id);
                  return acc+(e?totalScore(e.rounds):0);
                },0);
                const seasonsIn=seasons.filter(s=>s.entries.find(e=>e.playerId===p.id)).length;
                return (
                  <div key={p.id} style={{background:"#0d1117",border:"1px solid #1e293b",
                    borderRadius:14,padding:"12px 14px",display:"flex",alignItems:"center",gap:12}}>
                    <Avatar name={p.name} id={p.id} size={42}/>
                    <div style={{flex:1}}>
                      <div style={{fontWeight:700,fontSize:14,color:"#f1f5f9"}}>{p.name}</div>
                      <div style={{fontSize:11,color:"#475569",marginTop:2}}>
                        {seasonsIn} saison{seasonsIn!==1?"s":""} · {fmt(totalPts)} pts cumulés
                      </div>
                    </div>
                    <button onClick={()=>deletePlayer(p.id)} style={{
                      background:"#7f1d1d22",border:"1px solid #7f1d1d44",borderRadius:8,
                      color:"#f87171",width:32,height:32,cursor:"pointer",fontSize:14,
                      display:"flex",alignItems:"center",justifyContent:"center"}}>🗑</button>
                  </div>
                );
              })}
              {players.length===0&&(
                <div style={{textAlign:"center",padding:"60px 0",color:"#374151"}}>
                  <div style={{fontSize:48}}>👤</div><p>Aucun joueur créé.</p>
                </div>
              )}
            </div>
          </div>
        )}
      </div>

      {/* Tab bar */}
      <div style={{position:"fixed",bottom:0,left:0,right:0,background:"#070b14",
        borderTop:"1px solid #0f172a",display:"flex",justifyContent:"space-around",
        padding:"10px 0 14px",zIndex:50}}>
        {tabs.map(t=>(
          <button key={t.id} onClick={()=>setView(t.id)} style={{
            background:"none",border:"none",cursor:"pointer",
            display:"flex",flexDirection:"column",alignItems:"center",gap:4,
            color:view===t.id?"#60a5fa":"#374151",transition:"color 0.2s"}}>
            <span style={{fontSize:20}}>{t.icon}</span>
            <span style={{fontSize:10,fontWeight:700,letterSpacing:1,textTransform:"uppercase",
              fontFamily:"'Orbitron',monospace"}}>{t.label}</span>
            {view===t.id&&<div style={{width:20,height:2,background:"#60a5fa",borderRadius:2,marginTop:-2}}/>}
          </button>
        ))}
      </div>

      {/* ══ MODALS ══ */}

      {modal==="newSeason"&&(
        <Modal title="Nouvelle saison" onClose={()=>setModal(null)}>
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            <Input value={mSeason.name} onChange={v=>setMSeason(s=>({...s,name:v}))} placeholder="Nom (ex: Saison 2)"/>
            <Input value={mSeason.totalGames} onChange={v=>setMSeason(s=>({...s,totalGames:v}))}
              placeholder="Nb parties max (ex: 10)" type="number"/>
            <div style={{display:"flex",gap:8,marginTop:6}}>
              <Btn onClick={createSeason} variant="season" style={{flex:1}}>Créer</Btn>
              <Btn onClick={()=>setModal(null)} variant="ghost">Annuler</Btn>
            </div>
          </div>
        </Modal>
      )}

      {modal==="newPlayer"&&(
        <Modal title="Nouveau joueur" onClose={()=>setModal(null)}>
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            <Input value={mPlayer.name} onChange={v=>setMPlayer({name:v})} placeholder="Nom du joueur"/>
            <div style={{display:"flex",gap:8,marginTop:6}}>
              <Btn onClick={createPlayer} variant="primary" style={{flex:1}}>Ajouter</Btn>
              <Btn onClick={()=>setModal(null)} variant="ghost">Annuler</Btn>
            </div>
          </div>
        </Modal>
      )}

      {modal==="addRound"&&(()=>{
        const p=players.find(pl=>pl.id===mEntry.playerId);
        if(!p) return null;
        const s1 = parseFloat(mEntry.s1) || 0;
        const s2 = parseFloat(mEntry.s2) || 0;
        const total = Math.round((s1 + s2) * 10000) / 10000;
        const [c1]=pc(p.id);
        return (
          <Modal title={`Nouvelle partie — ${p.name}`} onClose={()=>setModal(null)}>
            <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:18}}>
              <Avatar name={p.name} id={p.id} size={44}/>
              <div>
                <div style={{fontWeight:700,fontSize:15,color:"#e2e8f0"}}>{p.name}</div>
                <div style={{fontSize:12,color:"#475569"}}>{currentSeason?.name}</div>
              </div>
            </div>

            {/* Live total preview */}
            <div style={{background:"#111827",border:"1px solid #1f2937",borderRadius:12,
              padding:"14px 16px",marginBottom:16,textAlign:"center"}}>
              <div style={{fontSize:11,color:"#64748b",letterSpacing:2,marginBottom:6}}>
                TOTAL DE LA PARTIE
              </div>
              <div style={{fontFamily:"monospace",fontWeight:900,fontSize:28,
                color:total>0?c1:"#334155",transition:"color 0.2s"}}>
                {total > 0 ? total : "—"}
              </div>
              <div style={{fontSize:13,color:"#475569",marginTop:4,fontFamily:"monospace"}}>
                <span style={{color:s1>0?c1:"#334155"}}>{mEntry.s1||"—"}</span>
                <span style={{color:"#334155",margin:"0 8px"}}>+</span>
                <span style={{color:s2>0?c1:"#334155"}}>{mEntry.s2||"—"}</span>
              </div>
            </div>

            <div style={{display:"flex",flexDirection:"column",gap:10}}>
              <div>
                <label style={{fontSize:11,color:"#64748b",letterSpacing:1,display:"block",marginBottom:5}}>
                  SCORE 1 — 1ère manche
                </label>
                <input value={mEntry.s1} onChange={e=>setMEntry(m=>({...m,s1:e.target.value}))}
                  placeholder="ex: 4.5" inputMode="decimal"
                  style={{background:"#111827",border:"1px solid #1f2937",borderRadius:10,
                    color:"#f1f5f9",padding:"10px 14px",fontSize:14,outline:"none",
                    width:"100%",boxSizing:"border-box"}}/>
              </div>
              <div>
                <label style={{fontSize:11,color:"#64748b",letterSpacing:1,display:"block",marginBottom:5}}>
                  SCORE 2 — 2ème manche
                </label>
                <input value={mEntry.s2} onChange={e=>setMEntry(m=>({...m,s2:e.target.value}))}
                  placeholder="ex: 4.5" inputMode="decimal"
                  style={{background:"#111827",border:"1px solid #1f2937",borderRadius:10,
                    color:"#f1f5f9",padding:"10px 14px",fontSize:14,outline:"none",
                    width:"100%",boxSizing:"border-box"}}/>
              </div>
              <div style={{display:"flex",gap:8,marginTop:6}}>
                <Btn onClick={saveRound} variant="success" style={{flex:1}}>Enregistrer</Btn>
                <Btn onClick={()=>setModal(null)} variant="ghost">Annuler</Btn>
              </div>
            </div>
          </Modal>
        );
      })()}

      {modal==="viewRounds"&&mRounds&&(()=>{
        const entry=currentSeason?.entries.find(e=>e.playerId===mRounds.playerId);
        const rounds=entry?.rounds||[];
        const [c1]=pc(mRounds.playerId);
        return (
          <Modal title={`Parties — ${mRounds.playerName}`} onClose={()=>setModal(null)}>
            {rounds.length===0?(
              <p style={{color:"#475569",textAlign:"center",fontSize:13,padding:"20px 0"}}>
                Aucune partie enregistrée.
              </p>
            ):(
              <>
                {/* Summary */}
                <div style={{background:"#111827",border:"1px solid #1f2937",borderRadius:12,
                  padding:"12px 16px",marginBottom:14,display:"flex",justifyContent:"space-between"}}>
                  <div style={{textAlign:"center"}}>
                    <div style={{fontSize:10,color:"#64748b",letterSpacing:1}}>PARTIES</div>
                    <div style={{fontWeight:900,fontSize:18,color:"#e2e8f0",marginTop:3}}>{rounds.length}</div>
                  </div>
                  <div style={{textAlign:"center"}}>
                    <div style={{fontSize:10,color:"#64748b",letterSpacing:1}}>TOTAL</div>
                    <div style={{fontWeight:900,fontSize:18,color:c1,marginTop:3,fontFamily:"monospace"}}>
                      {fmt(totalScore(rounds))}
                    </div>
                  </div>
                  <div style={{textAlign:"center"}}>
                    <div style={{fontSize:10,color:"#64748b",letterSpacing:1}}>MOY / PARTIE</div>
                    <div style={{fontWeight:900,fontSize:18,color:"#e2e8f0",marginTop:3,fontFamily:"monospace"}}>
                      {fmt(totalScore(rounds)/rounds.length)}
                    </div>
                  </div>
                </div>

                <div style={{display:"flex",flexDirection:"column",gap:7,marginBottom:12}}>
                  {rounds.map((r,i)=>(
                    <div key={i} style={{display:"flex",alignItems:"center",gap:10,
                      background:"#111827",border:"1px solid #1f2937",borderRadius:10,padding:"10px 12px"}}>
                      <div style={{width:30,height:30,borderRadius:8,background:"#1e293b",
                        display:"flex",alignItems:"center",justifyContent:"center",
                        fontSize:11,fontWeight:700,color:"#64748b",flexShrink:0}}>
                        P{i+1}
                      </div>
                      <div style={{flex:1}}>
                        <div style={{fontSize:13,fontFamily:"monospace",color:"#e2e8f0"}}>
                          <span style={{color:c1,fontWeight:700}}>{r.s1}</span>
                          <span style={{color:"#334155",margin:"0 6px"}}>+</span>
                          <span style={{color:c1,fontWeight:700}}>{r.s2}</span>
                        </div>
                        <div style={{fontSize:11,color:"#475569",marginTop:2}}>
                          Total : <span style={{color:c1,fontWeight:700}}>{fmt((parseFloat(r.s1)||0)+(parseFloat(r.s2)||0))}</span>
                        </div>
                      </div>
                      <button onClick={()=>deleteRound(mRounds.playerId,i)} style={{
                        background:"#7f1d1d22",border:"1px solid #7f1d1d44",borderRadius:7,
                        color:"#f87171",width:28,height:28,cursor:"pointer",fontSize:12,
                        display:"flex",alignItems:"center",justifyContent:"center"}}>🗑</button>
                    </div>
                  ))}
                </div>
              </>
            )}
            <Btn onClick={()=>setModal(null)} variant="ghost" style={{width:"100%",textAlign:"center"}}>
              Fermer
            </Btn>
          </Modal>
        );
      })()}

      {modal==="seasonPlayers"&&(()=>{
        const s=seasons.find(sx=>sx.id===mSeasonId);
        if(!s) return null;
        const inSeason=s.entries.map(e=>players.find(p=>p.id===e.playerId)).filter(Boolean);
        const outSeason=players.filter(p=>!s.entries.find(e=>e.playerId===p.id));
        return (
          <Modal title={`Joueurs — ${s.name}`} onClose={()=>setModal(null)}>
            {outSeason.length>0&&(
              <>
                <div style={{fontSize:11,color:"#64748b",letterSpacing:1,marginBottom:8}}>
                  AJOUTER À LA SAISON
                </div>
                <div style={{display:"flex",flexDirection:"column",gap:6,marginBottom:16}}>
                  {outSeason.map(p=>(
                    <div key={p.id} style={{display:"flex",alignItems:"center",gap:10,
                      background:"#111827",borderRadius:10,padding:"9px 12px"}}>
                      <Avatar name={p.name} id={p.id} size={32}/>
                      <span style={{flex:1,fontSize:13,color:"#e2e8f0",fontWeight:600}}>{p.name}</span>
                      <button onClick={()=>addPlayerToSeason(s.id,p.id)} style={{
                        background:"#14532d22",border:"1px solid #14532d55",borderRadius:7,
                        color:"#4ade80",padding:"5px 10px",cursor:"pointer",fontSize:12,fontWeight:700
                      }}>+ Ajouter</button>
                    </div>
                  ))}
                </div>
              </>
            )}
            {inSeason.length>0&&(
              <>
                <div style={{fontSize:11,color:"#64748b",letterSpacing:1,marginBottom:8}}>
                  DANS LA SAISON ({inSeason.length})
                </div>
                <div style={{display:"flex",flexDirection:"column",gap:6}}>
                  {inSeason.map(p=>(
                    <div key={p.id} style={{display:"flex",alignItems:"center",gap:10,
                      background:"#0d1117",border:"1px solid #1e293b",borderRadius:10,padding:"9px 12px"}}>
                      <Avatar name={p.name} id={p.id} size={32}/>
                      <span style={{flex:1,fontSize:13,color:"#e2e8f0",fontWeight:600}}>{p.name}</span>
                      <button onClick={()=>removePlayerFromSeason(s.id,p.id)} style={{
                        background:"#7f1d1d22",border:"1px solid #7f1d1d44",borderRadius:7,
                        color:"#f87171",padding:"5px 10px",cursor:"pointer",fontSize:12
                      }}>Retirer</button>
                    </div>
                  ))}
                </div>
              </>
            )}
            {players.length===0&&(
              <p style={{color:"#374151",textAlign:"center",fontSize:13}}>
                Aucun joueur. Allez dans l'onglet Joueurs.
              </p>
            )}
            <Btn onClick={()=>setModal(null)} variant="ghost"
              style={{width:"100%",marginTop:16,textAlign:"center"}}>Fermer</Btn>
          </Modal>
        );
      })()}
    </div>
  );
}

    // ── Persistence ──────────────────────────────────────────────────────────
    const SAVE_KEY = "superjeu_v1";
    function loadSaved() {
      try { const d = localStorage.getItem(SAVE_KEY); return d ? JSON.parse(d) : null; } catch(e) { return null; }
    }
    function saveAll(players, seasons, activeSeason) {
      try { localStorage.setItem(SAVE_KEY, JSON.stringify({players, seasons, activeSeason})); } catch(e) {}
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("/le-super-jeu/sw.js", { scope: "/le-super-jeu/" })
          .catch(err => console.log("SW error:", err));
      });
    }
  </script>
</body>
</html>
